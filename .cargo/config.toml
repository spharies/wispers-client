# Android requires 16KB page alignment (API 35+ / Android 15)
[target.aarch64-linux-android]
rustflags = ["-Clink-arg=-Wl,-z,max-page-size=16384"]

[target.x86_64-linux-android]
rustflags = ["-Clink-arg=-Wl,-z,max-page-size=16384"]

[target.armv7-linux-androideabi]
rustflags = ["-Clink-arg=-Wl,-z,max-page-size=16384"]
