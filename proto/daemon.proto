// -*- protobuf -*-
// IPC protocol between wconnect CLI commands and the local daemon.
// The daemon maintains the persistent connection to the hub.

syntax = "proto3";
package connect.daemon;
option go_package = "connect/client/proto/daemonpb";

// Request from CLI to daemon.
message DaemonRequest {
  oneof kind {
    StatusRequest status = 1;
    GeneratePairingSecretRequest generate_pairing_secret = 2;
  }
}

// Response from daemon to CLI.
message DaemonResponse {
  oneof kind {
    StatusResponse status = 1;
    GeneratePairingSecretResponse generate_pairing_secret = 2;
    ErrorResponse error = 100;
  }
}

// Check daemon status.
message StatusRequest {}

message StatusResponse {
  bool connected_to_hub = 1;
  string connectivity_group_id = 2;
  int32 node_number = 3;
}

// Generate a pairing secret for activation.
// The daemon stores the secret in memory to verify incoming pairing requests.
message GeneratePairingSecretRequest {}

message GeneratePairingSecretResponse {
  // The secret to share with the peer out-of-band.
  // Typically displayed to the user to enter on the other device.
  string secret = 1;
}

message ErrorResponse {
  string message = 1;
}
