// -*- protobuf -*-
// External gRPC interface of the Wispers Connect hub.

syntax = "proto3";
package connect.hub;
option go_package = "connect/client/proto/hubpb";
option java_package = "dev.wispers.connect.proto.hub";

import "roster.proto";

service Hub {
  // Completes node registration using a registration token.
  // Returns the node's credentials for future authenticated requests.
  rpc CompleteNodeRegistration(NodeRegistrationRequest) returns (NodeRegistration) {}

  // RPCs below all require authentication via metadata:
  // x-connectivity-group-id, x-node-number, x-auth-token

  // Activation.
  rpc PairNodes(PairNodesMessage) returns (PairNodesMessage) {}
  rpc UpdateRoster(UpdateRosterRequest) returns (UpdateRosterResponse) {}

  // Lists all nodes in the same connectivity group as the caller.
  rpc ListNodes(ListNodesRequest) returns (NodeList) {}

  // Returns the cryptographic roster of the node's connectivity group.
  rpc GetRoster(RosterRequest) returns (roster.Roster) {}

  // Opens a persistent, bidirectional connection for the node to serve incoming
  // requests.  The hub forwards requests through this stream; the node sends
  // responses back.
  rpc StartServing(stream ServingResponse) returns (stream ServingRequest) {}

  // Peer-to-peer connection establishment.
  rpc GetStunTurnConfig(StunTurnConfigRequest) returns (StunTurnConfig) {}
  rpc StartConnection(StartConnectionRequest) returns (StartConnectionResponse) {}

}

//-- Registration --------------------------------------------------------------

message NodeRegistrationRequest {
  string token = 1;
}

message NodeRegistration {
  string connectivity_group_id = 1;
  int32 node_number = 2;
  string auth_token = 3;
}

//-- Activation ----------------------------------------------------------------

message PairNodesMessage {
  message Payload {
    // Node numbers in the same connectivity group.
    int32 sender_node_number = 1;
    int32 receiver_node_number = 2;
    // The sender's public key.
    bytes public_key_spki = 3;
    // Nonces to prevent replays. reply_nonce is set if this PairNodes request
    // is in response to a previous request.
    bytes nonce = 4;
    bytes reply_nonce = 5;
  }
  Payload payload = 1;
  bytes mac = 2;
}

message UpdateRosterRequest {
  roster.Roster new_roster = 1;
}

message UpdateRosterResponse {
  roster.Roster cosigned_roster = 1;
}

message RosterCosignRequest {
  int64 new_node_number = 1;
  roster.Roster new_roster = 2;
}

message RosterCosignResponse {
  bytes endorser_signature = 1;
}

//-- Connectivity group state --------------------------------------------------

message ListNodesRequest {
  // Empty - connectivity_group_id is derived from authenticated caller
}

message NodeList {
  repeated Node nodes = 1;
}

message Node {
  int32 node_number = 1;
  string name = 2;
  int64 last_seen_at_millis = 3;
}

message RosterRequest {
  // Empty - connectivity_group_id is derived from authenticated caller
}

//-- Serving -------------------------------------------------------------------

// Initial message sent by hub when a node connects to StartServing.
message Welcome {
  // Reserved for future use (e.g., roster, display name).
}

message ServingRequest {
  int32 dest_node_number = 1;
  int64 request_id = 2;

  oneof kind {
    Welcome welcome = 10;
    PairNodesMessage pair_nodes_message = 11;
    RosterCosignRequest roster_cosign_request = 12;
    StartConnectionRequest start_connection_request = 13;
  }
}

message ServingResponse {
  int64 request_id = 1;
  string error = 2;

  oneof kind {
    PairNodesMessage pair_nodes_message = 10;
    RosterCosignResponse roster_cosign_response = 11;
    StartConnectionResponse start_connection_response = 12;
  }
}

//-- Peer-to-peer connection ---------------------------------------------------

message StunTurnConfigRequest {
  // Empty - credentials are generated per-call
}

message StunTurnConfig {
  string stun_server = 1;       // e.g., "stun.wispers.dev:3478"
  string turn_server = 2;       // e.g., "turn.wispers.dev:3478"
  string turn_username = 3;     // TURN auth username
  string turn_password = 4;     // TURN auth password
  int64 expires_at_millis = 5;  // When TURN credentials expire
}

// Sent by caller to initiate a P2P connection.
// Hub forwards to answerer via StartServing stream.
message StartConnectionRequest {
  int32 answerer_node_number = 1;
  bytes caller_x25519_public_key = 2;
  string caller_sdp = 3;        // ICE candidates + ufrag/pwd (opaque from libjuice)
  bytes signature = 4;          // Ed25519 signature over fields 1-3
}

// Returned by answerer, forwarded back to caller.
message StartConnectionResponse {
  int64 connection_id = 1;              // Answerer-generated, for tracking
  bytes answerer_x25519_public_key = 2;
  string answerer_sdp = 3;
  bytes signature = 4;                  // Ed25519 signature over fields 1-3
}
